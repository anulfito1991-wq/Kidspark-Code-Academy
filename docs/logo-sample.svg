<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Spark → Indigo diagonal gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <!-- Soft inner highlight on the bolt -->
    <linearGradient id="boltFill" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F1ECFF"/>
    </linearGradient>

    <!-- Amber badge gradient for the Code variant -->
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Soft drop shadow -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Inner glow on the rounded square -->
    <radialGradient id="innerGlow" cx="0.3" cy="0.25" r="0.9">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square app-icon canvas (iOS squircle-ish) -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#innerGlow)"/>

  <!-- The Spark: rounded lightning bolt, ~60% coverage, optically centered.
       K-hint: the vertical stem on the left + two diagonal arms evoke a K. -->
  <g filter="url(#softShadow)">
    <path d="
        M 560 170
        L 360 520
        Q 348 541 372 541
        L 484 541
        L 404 830
        Q 398 854 418 840
        L 690 520
        Q 708 499 684 499
        L 568 499
        L 648 200
        Q 654 176 632 176
        Z"
      fill="url(#boltFill)"
      stroke="none"
      stroke-linejoin="round"/>
  </g>

  <!-- </> Code-app badge, bottom-right, ~20% canvas -->
  <g transform="translate(700,700)">
    <rect x="0" y="0" width="240" height="240" rx="64" ry="64" fill="url(#badge)"/>
    <rect x="0" y="0" width="240" height="240" rx="64" ry="64" fill="url(#innerGlow)"/>
    <!-- < -->
    <path d="M 92 80 L 52 120 L 92 160"
          stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- / -->
    <path d="M 138 70 L 112 170"
          stroke="#FFFFFF" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.9"/>
    <!-- > -->
    <path d="M 148 80 L 188 120 L 148 160"
          stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
